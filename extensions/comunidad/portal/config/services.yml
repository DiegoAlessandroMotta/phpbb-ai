services:
    comunidad.portal.controller:
        class: comunidad\portal\controller\main
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@template'
            - '@user'
            - '@auth'
            - '@controller.helper'
            - '%core.root_path%'
            - '%core.php_ext%'

    comunidad.portal.acp.controller:
        class: comunidad\portal\controller\acp_news
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@request'
            - '@template'
            - '@user'

    comunidad.portal.acp.extraction.controller:
        class: comunidad\portal\controller\acp_extraction
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@request'
            - '@template'
            - '@user'
            - '@comunidad.portal.extraction.service'
            - '%core.root_path%'
            - '%core.php_ext%'
            - '%core.table_prefix%'

    comunidad.portal.listener:
        class: comunidad\portal\event\main_listener
        arguments:
            - '@controller.helper'
            - '@template'
            - '@user'
        tags:
            - { name: event.listener }

    comunidad.portal.llm.client:
        class: comunidad\portal\service\llm\GeminiClient
        arguments:
            - '@config'

    comunidad.portal.extraction.service:
        class: comunidad\portal\service\extraction\EntityExtractionService
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@comunidad.portal.llm.client'
            - '%core.table_prefix%'

    comunidad.portal.listener.posting:
        class: comunidad\portal\event\posting_listener
        arguments:
            - '@config'
            - '@dbal.conn'
            - '%core.table_prefix%'
        tags:
            - { name: event.listener }

    comunidad.portal.listener.viewtopic:
        class: comunidad\portal\event\viewtopic_listener
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@template'
            - '@user'
            - '%core.table_prefix%'
        tags:
            - { name: event.listener }

    comunidad.portal.cron.task.extraction:
        class: comunidad\portal\cron\extract_news_entities
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@log'
            - '@comunidad.portal.extraction.service'
            - '%core.table_prefix%'
        calls:
            - [set_name, [cron.task.portal_extraction]]
        tags:
            - { name: cron.task }

    comunidad.portal.assistant.rate_limiter:
        class: comunidad\portal\service\assistant\RateLimiter
        arguments:
            - '@config'
            - '@dbal.conn'
            - '%core.table_prefix%'

    comunidad.portal.assistant.service:
        class: comunidad\portal\service\assistant\AssistantService
        arguments:
            - '@config'
            - '@dbal.conn'
            - '@comunidad.portal.llm.client'
            - '@comunidad.portal.assistant.rate_limiter'
            - '%core.table_prefix%'

    comunidad.portal.controller.assistant:
        class: comunidad\portal\controller\assistant
        arguments:
            - '@config'
            - '@request'
            - '@user'
            - '@auth'
            - '@comunidad.portal.assistant.service'
