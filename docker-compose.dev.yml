# Dev override for the phpBB stack.
# Use with:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Adds:
#   * a local MariaDB (no external DB needed).
#   * Caddy reverse proxy with mkcert TLS at https://forum.local.
#   * bind-mount ./html so you can edit phpBB code in your editor.
#
# Anything not redefined here inherits from docker-compose.yml —
# compose merges service definitions on the same name; new services
# are added on top.

services:
  phpbb:
    container_name: forum-app
    # Direct port to the container for debugging (bypass Caddy).
    # Comment out if you only want to go through the proxy.
    ports:
      - "${PHPBB_HTTP_PORT:-8000}:80"
    environment:
      # In dev, Caddy fronts phpBB over HTTPS, so we tell phpBB the
      # same thing it sees in prod: HTTPS + behind a reverse proxy.
      PHPBB_WEB_HOST: ${PHPBB_WEB_HOST:-forum.local}
      PHPBB_WEB_PROTOCOL: ${PHPBB_WEB_PROTOCOL:-https}
      PHPBB_BEHIND_PROXY: "1"
      PHPBB_DB_HOST: db
      # Verbose debug output. Set to "0" (or unset) for prod-like
      # silent behaviour.
      PHPBB_DEBUG: "1"
      # Extensions to auto-enable on container start. Comma-separated
      # vendor/ext names. Empty by default; set in .env.
      PHPBB_EXTENSIONS: ${PHPBB_EXTENSIONS:-}
      # Default style to activate on container start (e.g. "digi").
      # Empty by default — phpBB ships with prosilver as default. The
      # style's code must live under ./styles/<name>/ and be
      # inherited from prosilver (or another installed style).
      PHPBB_DEFAULT_STYLE: ${PHPBB_DEFAULT_STYLE:-}
      # Parent style for PHPBB_DEFAULT_STYLE. Defaults to "prosilver"
      # when unset.
      PHPBB_DEFAULT_STYLE_PARENT: ${PHPBB_DEFAULT_STYLE_PARENT:-prosilver}
    # Bind-mount the doc root so phpBB files are visible + editable
    # in your editor at ./html/. The entrypoint copies the staged
    # source into ./html on first boot only.
    volumes:
      - ./html:/var/www/html
      - ./docker/php/zz-phpbb.ini:/usr/local/etc/php/conf.d/zz-phpbb.ini:ro
      # Install-config template. envsubst's at first boot to produce
      # the YAML the CLI installer reads. Mounted :ro — the rendered
      # file goes to /tmp/.
      - ./install-config.yml.template:/etc/phpbb/install-config.yml.template:ro
      # phpBB extensions. Drop extension code into ./extensions/
      # following the layout <vendor>/<ext>/ (e.g. extensions/comunidad/portal/).
      # The entrypoint copies them into /var/www/html/ext/ on every
      # container start (phase 2.6) so changes in your editor take
      # effect on restart. Mounted :ro so the container can't mutate
      # your working copy.
      - ./extensions:/etc/phpbb/extensions:ro
      # phpBB styles. Drop style directories into ./styles/
      # (e.g. styles/digi/, styles/prosilver_se/). The entrypoint
      # copies them into /var/www/html/styles/ on every container
      # start (phase 2.8). Mounted :ro for the same reason as
      # extensions — the host copy is source of truth.
      - ./styles:/etc/phpbb/styles:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - forum-net

  db:
    image: mariadb:10.11
    container_name: forum-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${PHPBB_DB_NAME:-phpbb}
      MARIADB_USER: ${PHPBB_DB_USER:-phpbb}
      MARIADB_PASSWORD: ${PHPBB_DB_PASSWORD:-phpbb}
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --innodb_file_per_table=On
      - --wait-timeout=28800
      - --skip-log-bin
    ports:
      - "${PHPBB_DB_PORT:-3306}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      # MariaDB's bundled healthcheck: pings the server, returns 0
      # only after InnoDB has finished initialising.
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - forum-net

  caddy:
    image: caddy:2
    container_name: forum-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # mkcert-generated certs. Drop them in ./docker/caddy/certs/
      # with the names: forum.local.pem and forum.local-key.pem
      # (or whatever PHPBB_WEB_HOST is set to).
      - ./docker/caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - phpbb
    networks:
      - forum-net

volumes:
  dbdata:
  caddy_data:
  caddy_config:

networks:
  forum-net:
    driver: bridge
