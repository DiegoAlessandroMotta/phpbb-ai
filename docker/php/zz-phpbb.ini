; phpBB PHP overrides. Loaded from /usr/local/etc/php/conf.d/zz-phpbb.ini
; (zz- prefix makes it load last, overriding anything earlier).

; Attachments can be large; raise upload limits from the 2M/8M defaults.
upload_max_filesize = 64M
post_max_size       = 64M
memory_limit        = 256M
max_execution_time  = 300

; Opcache. phpBB's template/theme cache is large; opcache makes a
; real difference. Validate timestamps every 2s in dev so file edits
; don't need a manual reset; in prod, set opcache.revalidate_freq=0
; for max throughput.
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
opcache.revalidate_freq        = 2

; Hide stack-arg values in error output (info-leak hardening).
zend.exception_ignore_args = 1
